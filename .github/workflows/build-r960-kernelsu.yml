name: Build SM-R960 KernelSU Kernel

on:
  workflow_dispatch:
    inputs:
      ksu_ref:
        description: "KernelSU ref: stable, main, or tag"
        required: true
        default: "stable"
      source_release_tag:
        description: "Release tag containing Kernel.tar.gz and R960XXU1CYK2_Kernel.tar.gz"
        required: true
        default: "source-tarballs"

permissions:
  contents: write

jobs:
  build:
    name: Build SM-R960 KernelSU
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Samsung source tarballs from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          mkdir -p source

          gh release download "${{ github.event.inputs.source_release_tag }}" \
            --repo "${{ github.repository }}" \
            --dir source \
            --pattern "*.tar.gz"

          echo "===== DOWNLOADED SOURCE FILES ====="
          ls -lh source

          test -f source/Kernel.tar.gz
          test -f source/R960XXU1CYK2_Kernel.tar.gz

      - name: Install build dependencies
        run: |
          set -e

          sudo apt update

          sudo apt install -y \
            build-essential bc bison flex libssl-dev libelf-dev \
            python3 python-is-python3 perl git unzip zip tar lz4 xz-utils zstd \
            clang-14 lld-14 llvm-14 rsync cpio kmod dwarves patch file curl \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi

      - name: Download Android clang r450784e
        run: |
          set -e

          mkdir -p toolchains
          cd toolchains

          git clone --depth=1 --filter=blob:none --sparse \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
            android-clang

          cd android-clang
          git sparse-checkout set clang-r450784e

          echo "$PWD/clang-r450784e/bin" >> "$GITHUB_PATH"

          echo "===== CLANG CHECK ====="
          ./clang-r450784e/bin/clang --version

      - name: Extract Samsung kernel source
        run: |
          set -e

          mkdir -p work/kernel

          echo "===== EXTRACT BASE KERNEL ====="
          tar -xzf source/Kernel.tar.gz -C work/kernel

          echo "===== APPLY SM-R960 DIFF ====="
          tar -xzf source/R960XXU1CYK2_Kernel.tar.gz -C work/kernel --strip-components=1

          echo "===== CHECK DEFCONFIG ====="
          find work/kernel/arch/arm64/configs -type f | grep -i "wise6blue"

          echo "===== SOURCE TOP LEVEL ====="
          ls -la work/kernel | head -50

      - name: Build stock kernel first
        run: |
          set -e

          cd work/kernel

          export PLATFORM_VERSION=16
          export TARGET_SOC=s5e5515
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export KBUILD_BUILD_USER=dpi
          export KBUILD_BUILD_HOST=VPHORC629
          export PATH="$GITHUB_WORKSPACE/toolchains/android-clang/clang-r450784e/bin:$PATH"

          make O=out s5e5515-wise6blue_defconfig

          # Match your stock CZB6 kernel release string as closely as possible.
          ./scripts/config --file out/.config --set-str LOCALVERSION "-33003255-abR960XXU2CZB6" || true
          ./scripts/config --file out/.config -d LOCALVERSION_AUTO || true
          make O=out olddefconfig

          echo "===== STOCK CONFIG VERSION CHECK ====="
          grep -E "CONFIG_LOCALVERSION|CONFIG_LOCALVERSION_AUTO" out/.config || true

          make O=out -j"$(nproc)"

          mkdir -p "$GITHUB_WORKSPACE/dist/stock"
          cp out/arch/arm64/boot/Image "$GITHUB_WORKSPACE/dist/stock/Image-stock-R960"
          cp out/.config "$GITHUB_WORKSPACE/dist/stock/stock.config"

          echo "===== STOCK IMAGE ====="
          ls -lh "$GITHUB_WORKSPACE/dist/stock/Image-stock-R960"

      - name: Add KernelSU
        run: |
          set -e

          cd work/kernel

          echo "===== ADDING KERNELSU ====="

          if [ "${{ github.event.inputs.ksu_ref }}" = "stable" ]; then
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
          else
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s "${{ github.event.inputs.ksu_ref }}"
          fi

          echo "===== KERNELSU FILE CHECK ====="
          find . -maxdepth 4 -iname "*kernelsu*" -o -iname "*ksu*" | head -100

      - name: Build KernelSU kernel
        run: |
          set -e

          cd work/kernel

          export PLATFORM_VERSION=16
          export TARGET_SOC=s5e5515
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export KBUILD_BUILD_USER=dpi
          export KBUILD_BUILD_HOST=VPHORC629
          export PATH="$GITHUB_WORKSPACE/toolchains/android-clang/clang-r450784e/bin:$PATH"

          make O=out s5e5515-wise6blue_defconfig

          # Match stock CZB6 kernel release string.
          ./scripts/config --file out/.config --set-str LOCALVERSION "-33003255-abR960XXU2CZB6" || true
          ./scripts/config --file out/.config -d LOCALVERSION_AUTO || true

          # Force KernelSU config on if scripts/config sees it.
          ./scripts/config --file out/.config -e KSU || true
          ./scripts/config --file out/.config -e KERNELSU || true

          make O=out olddefconfig

          echo "===== KERNELSU CONFIG CHECK ====="
          grep -Ei "KSU|KERNELSU|LOCALVERSION" out/.config || true

          make O=out -j"$(nproc)"

          mkdir -p "$GITHUB_WORKSPACE/dist/kernelsu"
          cp out/arch/arm64/boot/Image "$GITHUB_WORKSPACE/dist/kernelsu/Image-KernelSU-R960"
          cp out/.config "$GITHUB_WORKSPACE/dist/kernelsu/kernelsu.config"

          echo "===== KERNELSU IMAGE ====="
          ls -lh "$GITHUB_WORKSPACE/dist/kernelsu/Image-KernelSU-R960"

      - name: Package output
        run: |
          set -e

          cd work/kernel

          mkdir -p "$GITHUB_WORKSPACE/dist/modules"
          find out -type f -name "*.ko" -print -exec cp --parents {} "$GITHUB_WORKSPACE/dist/modules/" \; || true

          cd "$GITHUB_WORKSPACE/dist"

          tar -czf R960-modules.tar.gz modules || true

          cat > RELEASE_NOTES.txt <<EOF
          SM-R960 Galaxy Watch6 Classic KernelSU Build

          Device: SM-R960 / wise6bl / wise6blue
          Target firmware: R960XXU2CZB6
          Target kernel string: 5.15.180-33003255-abR960XXU2CZB6
          Base source: Kernel.tar.gz from SM-R930_NA_Opensource
          R960 diff: R960XXU1CYK2_Kernel.tar.gz
          Defconfig: s5e5515-wise6blue_defconfig
          KernelSU ref: ${{ github.event.inputs.ksu_ref }}

          Files:
          - Image-KernelSU-R960
          - kernelsu.config
          - Image-stock-R960
          - stock.config
          - R960-modules.tar.gz
          - SHA256SUMS.txt

          WARNING:
          Image-KernelSU-R960 is only the raw kernel Image.
          It is not flashable by itself.
          It must be repacked into the matching R960XXU2CZB6 boot.img.
          Do not flash on a locked bootloader.
          EOF

          sha256sum \
            kernelsu/Image-KernelSU-R960 \
            kernelsu/kernelsu.config \
            stock/Image-stock-R960 \
            stock/stock.config \
            R960-modules.tar.gz \
            > SHA256SUMS.txt

          echo "===== FINAL DIST FILES ====="
          find "$GITHUB_WORKSPACE/dist" -type f -maxdepth 3 -print -exec ls -lh {} \;

      - name: Create release tag
        id: vars
        run: |
          TAG="r960-kernelsu-${{ github.run_number }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using release tag: $TAG"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: SM-R960 KernelSU Build ${{ steps.vars.outputs.tag }}
          body_path: dist/RELEASE_NOTES.txt
          files: |
            dist/kernelsu/Image-KernelSU-R960
            dist/kernelsu/kernelsu.config
            dist/stock/Image-stock-R960
            dist/stock/stock.config
            dist/R960-modules.tar.gz
            dist/SHA256SUMS.txt
            dist/RELEASE_NOTES.txt
