name: Build SM-R960 ReSukiSU AP

on:
  workflow_dispatch:
    inputs:
      resukisu_setup_url:
        description: "ReSukiSU setup.sh URL"
        required: true
        default: "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh"
      source_release_tag:
        description: "Release tag containing Kernel.tar.gz and R960XXU1CYK2_Kernel.tar.gz"
        required: true
        default: "source-tarballs"
      firmware_release_tag:
        description: "Release tag containing boot.img.lz4, init_boot.img.lz4, vbmeta.img.lz4"
        required: true
        default: "firmware-r960-czb6"

permissions:
  contents: write

jobs:
  build:
    name: Build SM-R960 ReSukiSU AP
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Samsung source tarballs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          mkdir -p source

          gh release download "${{ github.event.inputs.source_release_tag }}"             --repo "${{ github.repository }}"             --dir source             --pattern "*.tar.gz"

          echo "===== SOURCE FILES ====="
          ls -lh source

          test -f source/Kernel.tar.gz
          test -f source/R960XXU1CYK2_Kernel.tar.gz

      - name: Download stock R960XXU2CZB6 firmware images
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          mkdir -p firmware

          gh release download "${{ github.event.inputs.firmware_release_tag }}"             --repo "${{ github.repository }}"             --dir firmware             --pattern "boot.img*"             --pattern "init_boot.img*"             --pattern "vbmeta.img*"

          echo "===== FIRMWARE FILES ====="
          ls -lh firmware

      - name: Install dependencies
        run: |
          set -e
          sudo apt update
          sudo apt install -y             build-essential bc bison flex libssl-dev libelf-dev             python3 python-is-python3 perl git unzip zip tar lz4 xz-utils zstd             clang-14 lld-14 llvm-14 rsync cpio kmod dwarves patch file curl             openssl             gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu             gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi

      - name: Set clang 14 path
        run: |
          set -e
          echo "/usr/lib/llvm-14/bin" >> "$GITHUB_PATH"
          /usr/lib/llvm-14/bin/clang --version
          /usr/lib/llvm-14/bin/ld.lld --version

      - name: Extract Samsung kernel source
        run: |
          set -e

          mkdir -p work/kernel

          tar -xzf source/Kernel.tar.gz -C work/kernel
          tar -xzf source/R960XXU1CYK2_Kernel.tar.gz -C work/kernel --strip-components=1

          echo "===== CHECK DEFCONFIG ====="
          find work/kernel/arch/arm64/configs -type f |
          grep -i "wise6blue"

      - name: Add ReSukiSU
        run: |
          set -e

          cd work/kernel

          echo "===== ADDING ReSukiSU ====="
          curl -LSs "${{ github.event.inputs.resukisu_setup_url }}" |
          bash -

          echo "===== APPLYING INLINE MANUAL HOOK PATCHES ====="
          cat << 'EOF' > resukisu_manual_hooks.patch
          --- a/fs/stat.c
          +++ b/fs/stat.c
          @@ -353,6 +353,16 @@
           	return cp_new_stat(&stat, statbuf);
           }
           
          +#ifdef CONFIG_KSU_MANUAL_HOOK
          +__attribute__((hot)) 
          +extern int ksu_handle_stat(int *dfd, const char __user **filename_user, int *flags);
          +extern void ksu_handle_newfstat_ret(unsigned int *fd, struct stat __user **statbuf_ptr);
          +#if defined(__ARCH_WANT_STAT64) || defined(__ARCH_WANT_COMPAT_STAT64)
          +extern void ksu_handle_fstat64_ret(unsigned long *fd, struct stat64 __user **statbuf_ptr);
          +#endif
          +#endif
          +
           #if !defined(__ARCH_WANT_STAT64) || defined(__ARCH_WANT_SYS_NEWFSTATAT)
           SYSCALL_DEFINE4(newfstatat, int, dfd, const char __user *, filename,
           		struct stat __user *, statbuf, int, flag)
          @@ -360,6 +370,9 @@
           	struct kstat stat;
           	int error;
           
          +#ifdef CONFIG_KSU_MANUAL_HOOK
          +	ksu_handle_stat(&dfd, &filename, &flag);
          +#endif
           	error = vfs_fstatat(dfd, filename, &stat, flag);
           	if (error)
           		return error;
          @@ -367,6 +380,9 @@
           SYSCALL_DEFINE2(newfstat, unsigned int, fd, struct stat __user *, statbuf)
           {
           	struct kstat stat;
          +#ifdef CONFIG_KSU_MANUAL_HOOK
          +	ksu_handle_newfstat_ret(&fd, &statbuf);
          +#endif
           	int error = vfs_fstat(fd, &stat);
           
           	if (!error)
          @@ -390,6 +406,9 @@
           SYSCALL_DEFINE2(fstat64, unsigned long, fd, struct stat64 __user *, statbuf)
           {
           	struct kstat stat;
          +#ifdef CONFIG_KSU_MANUAL_HOOK
          +	ksu_handle_fstat64_ret(&fd, &statbuf);
          +#endif
           	int error = vfs_fstat(fd, &stat);
           
           	if (!error)
          @@ -504,6 +523,9 @@
           	struct kstat stat;
           	int error;
           
          +#ifdef CONFIG_KSU_MANUAL_HOOK
          +	ksu_handle_stat(&dfd, &filename, &flag); 
          +#endif
           	error = vfs_fstatat(dfd, filename, &stat, flag);
           	if (error)
           		return error;
          --- a/fs/exec.c
          +++ b/fs/exec.c
          @@ -1886,12 +1886,24 @@
           	return retval;
           }
           
          +#ifdef CONFIG_KSU_MANUAL_HOOK
          +__attribute__((hot))
          +extern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv, void *envp, int *flags);
          +#endif
          +
           int do_execve(struct filename *filename,
           	const char __user *const __user *__argv,
           	const char __user *const __user *__envp)
           {
           	struct user_arg_ptr argv = { .ptr.native = __argv };
           	struct user_arg_ptr envp = { .ptr.native = __envp };
          +#ifdef CONFIG_KSU_MANUAL_HOOK
          +	ksu_handle_execveat((int *)AT_FDCWD, &filename, &argv, &envp, 0);
          +#endif
           	return do_execveat_common(AT_FDCWD, filename, argv, envp, 0);
           }
           
          @@ -1919,6 +1931,10 @@
           		.is_compat = true,
           		.ptr.compat = __envp,
           	};
          +#ifdef CONFIG_KSU_MANUAL_HOOK
          +	ksu_handle_execveat((int *)AT_FDCWD, &filename, &argv, &envp, 0);
          +#endif
           	return do_execveat_common(AT_FDCWD, filename, argv, envp, 0);
           }
          --- a/fs/open.c
          +++ b/fs/open.c
          @@ -450,8 +450,14 @@
           	return res;
           }
           
          +#ifdef CONFIG_KSU_MANUAL_HOOK
          +__attribute__((hot)) 
          +extern int ksu_handle_faccessat(int *dfd, const char __user **filename_user, int *mode, int *flags);
          +#endif
          +
           SYSCALL_DEFINE3(faccessat, int, dfd, const char __user *, filename, int, mode)
           {
          +#ifdef CONFIG_KSU_MANUAL_HOOK
          +	ksu_handle_faccessat(&dfd, &filename, &mode, NULL);
          +#endif
           	return do_faccessat(dfd, filename, mode);
           }
          --- a/kernel/reboot.c
          +++ b/kernel/reboot.c
          @@ -277,6 +277,10 @@
            *
            * reboot doesn't sync: do that yourself before calling this.
            */
          +
          +#ifdef CONFIG_KSU_MANUAL_HOOK
          +extern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd, void __user **arg);
          +#endif
           
           SYSCALL_DEFINE4(reboot, int, magic1, int, magic2, unsigned int, cmd,
           		void __user *, arg)
          @@ -284,6 +288,9 @@
           	char buffer[256];
           	int ret = 0;
           
          +#ifdef CONFIG_KSU_MANUAL_HOOK
          +	ksu_handle_sys_reboot(magic1, magic2, cmd, &arg);
          +#endif
           	/* We only trust the superuser with rebooting the system. */
           	if (!ns_capable(pid_ns->user_ns, CAP_SYS_BOOT))
           		return -EPERM;
          --- a/drivers/input/input.c
          +++ b/drivers/input/input.c
          @@ -436,11 +436,20 @@
            * to 'seed' initial state of a switch or initial position of absolute
            * axis, etc.
            */
          +#ifdef CONFIG_KSU_MANUAL_HOOK
          +extern bool ksu_input_hook __read_mostly;
          +extern __attribute__((cold)) int ksu_handle_input_handle_event(unsigned int *type, unsigned int *code, int *value);
          +#endif
          +
           void input_event(struct input_dev *dev,
           		 unsigned int type, unsigned int code, int value)
           {
           	unsigned long flags;
           
          +#ifdef CONFIG_KSU_MANUAL_HOOK
          +	if (unlikely(ksu_input_hook))
          +		ksu_handle_input_handle_event(&type, &code, &value);
          +#endif
           
           	if (is_event_supported(type, dev->evbit, EV_MAX)) {
            
           		spin_lock_irqsave(&dev->event_lock, flags);
          --- a/security/selinux/ss/services.c
          +++ b/security/selinux/ss/services.c
          @@ -76,7 +76,7 @@
           int selinux_policycap_openperm;
           int selinux_policycap_alwaysnetwork;
           
          -static DEFINE_RWLOCK(policy_rwlock);
          +DEFINE_RWLOCK(policy_rwlock);
           
           static struct sidtab sidtab;
           struct policydb policydb;
          --- a/security/selinux/hooks.c
          +++ b/security/selinux/hooks.c
          @@ -95,3 +95,3 @@
           
          -static struct security_operations selinux_ops = {
          +struct security_operations selinux_ops = {
           	.name =		"selinux",
          --- a/security/selinux/selinuxfs.c
          +++ b/security/selinux/selinuxfs.c
          @@ -41,3 +41,3 @@
           #include "conditional.h"
           
          -static DEFINE_MUTEX(sel_mutex);
          +DEFINE_MUTEX(sel_mutex);
          EOF

          patch -p1 < resukisu_manual_hooks.patch

          echo "===== ReSukiSU FILE CHECK ====="
          find . -maxdepth 5 \( -iname "*resukisu*" -o -iname "*kernelsu*" -o -iname "*ksu*" \) |
          head -150

      - name: Build ReSukiSU kernel
        run: |
          set -e

          cd work/kernel

          export PLATFORM_VERSION=16
          export TARGET_SOC=s5e5515
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export KBUILD_BUILD_USER=dpi
          export KBUILD_BUILD_HOST=VPHORC629
          export PATH="/usr/lib/llvm-14/bin:$PATH"

          make O=out_resukisu s5e5515-wise6blue_defconfig

          printf "" > .scmversion

          ./scripts/config --file out_resukisu/.config --set-str LOCALVERSION "-33003255-abR960XXU2CZB6" || true
          ./scripts/config --file out_resukisu/.config -d LOCALVERSION_AUTO || true

          # Ensure symbols are fully exposed for ReSukiSU's dynamic hook resolution engine
          ./scripts/config --file out_resukisu/.config -e KALLSYMS || true
          ./scripts/config --file out_resukisu/.config -e KALLSYMS_ALL || true

          # Enforce ReSukiSU Manual Hook engine configuration for Non-GKI hardware
          ./scripts/config --file out_resukisu/.config -e KSU_MANUAL_HOOK || true
          ./scripts/config --file out_resukisu/.config -e RESUKISU_MANUAL_HOOK || true

          ./scripts/config --file out_resukisu/.config -d MODULE_SIG_PROTECT || true
          ./scripts/config --file out_resukisu/.config -d UH || true
          ./scripts/config --file out_resukisu/.config -d RKP || true
          ./scripts/config --file out_resukisu/.config -d KDP || true
          ./scripts/config --file out_resukisu/.config -d SECURITY_DEFEX || true
          ./scripts/config --file out_resukisu/.config -d SVSMC || true
          ./scripts/config --file out_resukisu/.config -d SAMSUNG_PRODUCT_SHIP || true

          ./scripts/config --file out_resukisu/.config -e KSU || true
          ./scripts/config --file out_resukisu/.config -e KERNELSU || true
          ./scripts/config --file out_resukisu/.config -e RESUKISU || true

          make O=out_resukisu olddefconfig

          echo "===== SAMSUNG BLOCKER STRICT CHECK ====="
          grep -Ei "LOCALVERSION|KSU|KERNELSU|RESUKISU|MODULE_SIG_PROTECT|CONFIG_UH|CONFIG_RKP|CONFIG_KDP|CONFIG_SECURITY_DEFEX|CONFIG_SVSMC|CONFIG_SAMSUNG_PRODUCT_SHIP" out_resukisu/.config || true

          BAD=0
          for sym in             CONFIG_MODULE_SIG_PROTECT             CONFIG_UH             CONFIG_RKP             CONFIG_KDP             CONFIG_SECURITY_DEFEX             CONFIG_SVSMC             CONFIG_SAMSUNG_PRODUCT_SHIP
          do
            if grep -q "^${sym}=y" out_resukisu/.config; then
              echo "ERROR: $sym is still enabled"
              BAD=1
            fi
          done

          if [ "$BAD" = "1" ]; then
            echo "Samsung blocker config still enabled. Stop build."
            exit 1
          fi

          make O=out_resukisu -j"$(nproc)"

          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp out_resukisu/arch/arm64/boot/Image "$GITHUB_WORKSPACE/dist/Image-ReSukiSU-R960"
          cp out_resukisu/.config "$GITHUB_WORKSPACE/dist/resukisu.config"

          echo "===== BUILT KERNEL IMAGE ====="
          ls -lh "$GITHUB_WORKSPACE/dist/Image-ReSukiSU-R960"

      - name: Prepare stock firmware images
        run: |
          set -e

          mkdir -p work/firmware

          normalize_img() {
            name="$1"

            if [ -f "firmware/${name}.img" ]; then
              cp "firmware/${name}.img" "work/firmware/${name}.img"
              return 0
            fi

            if [ -f "firmware/${name}.img.lz4" ]; then
              lz4 -d -f "firmware/${name}.img.lz4" "work/firmware/${name}.img"
              return 0
            fi

            echo "Missing ${name}.img or ${name}.img.lz4"
            exit 1
          }

          normalize_img boot
          normalize_img init_boot
          normalize_img vbmeta

          echo "===== NORMALIZED FIRMWARE IMAGES ====="
          ls -lh work/firmware

      - name: Download avbtool
        run: |
          set -e

          echo "===== Download avbtool with retries/fallbacks ====="

          if [ -f "tools/avbtool.py" ]; then
            echo "Using repo-local tools/avbtool.py"
            cp tools/avbtool.py avbtool.py
          else
            mkdir -p tools

            python3 - <<'PY' ||
          import base64
          import time
          import urllib.request

          url = "https://android.googlesource.com/platform/external/avb/+/refs/heads/main/avbtool.py?format=TEXT"

          for attempt in range(1, 8):
              try:
                  print(f"Attempt {attempt}: {url}")
                  data = urllib.request.urlopen(url, timeout=60).read()
                  open("avbtool.py", "wb").write(base64.b64decode(data))
                  print("Downloaded avbtool.py from googlesource")
                  raise SystemExit(0)
              except Exception as e:
                  print("Failed:", e)
                  time.sleep(5)

          raise SystemExit(1)
          PY
          true

            if [ ! -s avbtool.py ]; then
              echo "Googlesource failed. Trying GitHub raw mirror..."
              curl -L --retry 10 --retry-all-errors --retry-delay 5                 -o avbtool.py                 https://raw.githubusercontent.com/aosp-mirror/platform_external_avb/master/avbtool.py
            fi

            if [ ! -s avbtool.py ]; then
              echo "Raw mirror failed. Cloning GitHub mirror..."
              git clone --depth=1 https://github.com/aosp-mirror/platform_external_avb.git tools/platform_external_avb
              cp tools/platform_external_avb/avbtool.py avbtool.py
            fi
          fi

          chmod +x avbtool.py

          echo "===== avbtool check ====="
          python3 avbtool.py --help >/dev/null
          python3 avbtool.py --version || true
          echo "avbtool OK"

      - name: Repack boot.img with ReSukiSU Image
        run: |
          set -e

          cat > repack_boot_v4.py <<'PY'
          import struct
          from pathlib import Path

          PAGE = 4096
          SEANDROID = b"SEANDROIDENFORCE"

          stock_path = Path("work/firmware/boot.img")
          kernel_path = Path("dist/Image-ReSukiSU-R960")
          out_path = Path("work/firmware/boot_resukisu_noavb.img")

          stock = stock_path.read_bytes()
          kernel = kernel_path.read_bytes()

          if stock[:8] != b"ANDROID!":
              raise SystemExit("stock boot.img is not an Android boot image")

          old_kernel_size = struct.unpack("<I", stock[8:12])[0]
          ramdisk_size = struct.unpack("<I", stock[12:16])[0]
          os_version = struct.unpack("<I", stock[16:20])[0]
          header_size = struct.unpack("<I", stock[20:24])[0]
          header_version = struct.unpack("<I", stock[40:44])[0]
          cmdline = stock[44:44 + 1536]

          print("Old kernel size:", old_kernel_size)
          print("New kernel size:", len(kernel))
          print("Ramdisk size:", ramdisk_size)
          print("Header size:", header_size)
          print("Header version:", header_version)

          if header_version != 4:
              raise SystemExit(f"Expected boot header v4, got {header_version}")

          if ramdisk_size != 0:
              raise SystemExit(f"Expected ramdisk_size 0 for R960 boot.img, got {ramdisk_size}")

          def pad(data: bytes, page=PAGE) -> bytes:
              rem = len(data) % page
              if rem:
                  data += b"␀" * (page - rem)
              return data

          hdr = bytearray()
          hdr += b"ANDROID!"
          hdr += struct.pack("<I", len(kernel))
          hdr += struct.pack("<I", 0)
          hdr += struct.pack("<I", os_version)
          hdr += struct.pack("<I", 1584)
          hdr += struct.pack("<4I", 0, 0, 0, 0)
          hdr += struct.pack("<I", 4)
          hdr += cmdline
          hdr += struct.pack("<I", 0)

          if len(hdr) != 1584:
              raise SystemExit(f"Bad header size: {len(hdr)}")

          img = bytes(hdr)
          img = pad(img)
          img += kernel
          img = pad(img)
          img += SEANDROID
          img = pad(img)

          if len(img) >= 50331648:
              raise SystemExit(f"New boot image too large: {len(img)}")

          out_path.write_bytes(img)
          print("Wrote:", out_path)
          print("Size:", out_path.stat().st_size)
          print("Room left:", 50331648 - out_path.stat().st_size)
          PY

          python3 repack_boot_v4.py

      - name: Generate local AVB key and re-footer boot/init_boot
        run: |
          set -e

          mkdir -p avb_keys

          openssl genrsa -out avb_keys/r960_local_avb.pem 4096

          cp work/firmware/boot_resukisu_noavb.img work/firmware/boot.img
          cp work/firmware/init_boot.img work/firmware/init_boot_refooter.img

          echo "===== Re-footer boot.img with local AVB key rollback index 2 ====="
          python3 avbtool.py erase_footer --image work/firmware/boot.img || true

          python3 avbtool.py add_hash_footer             --image work/firmware/boot.img             --partition_name boot             --partition_size 50331648             --algorithm SHA256_RSA4096             --key avb_keys/r960_local_avb.pem             --rollback_index 2

          echo "===== Re-footer init_boot.img with same local AVB key rollback index 2 ====="
          python3 avbtool.py erase_footer --image work/firmware/init_boot_refooter.img || true

          python3 avbtool.py add_hash_footer             --image work/firmware/init_boot_refooter.img             --partition_name init_boot             --partition_size 16777216             --algorithm SHA256_RSA4096             --key avb_keys/r960_local_avb.pem             --rollback_index 2

          mv work/firmware/init_boot_refooter.img work/firmware/init_boot.img

          echo "===== boot AVB info ====="
          python3 avbtool.py info_image --image work/firmware/boot.img || true

          echo "===== init_boot AVB info ====="
          python3 avbtool.py info_image --image work/firmware/init_boot.img || true

      - name: Generate new top-level vbmeta.img
        run: |
          set -e

          python3 avbtool.py make_vbmeta_image             --output work/firmware/vbmeta.img             --algorithm SHA256_RSA4096             --key avb_keys/r960_local_avb.pem             --rollback_index 2             --flags 3             --prop com.android.build.boot.os_version:16             --prop com.android.build.boot.security_patch:2026-02-05             --include_descriptors_from_image work/firmware/boot.img             --include_descriptors_from_image work/firmware/init_boot.img

          echo "===== New vbmeta info ====="
          python3 avbtool.py info_image --image work/firmware/vbmeta.img

      - name: Build plain POSIX Odin/NetOdin AP tar
        run: |
          set -e

          mkdir -p final_ap

          cp work/firmware/boot.img final_ap/boot.img
          cp work/firmware/init_boot.img final_ap/init_boot.img
          cp work/firmware/vbmeta.img final_ap/vbmeta.img

          tar --format=posix -cf dist/R960_ReSukiSU_AP.tar -C final_ap boot.img init_boot.img vbmeta.img

          cp dist/R960_ReSukiSU_AP.tar dist/R960_ReSukiSU_AP.tar.md5
          md5sum dist/R960_ReSukiSU_AP.tar >> dist/R960_ReSukiSU_AP.tar.md5

          sha256sum             dist/Image-ReSukiSU-R960             dist/resukisu.config             dist/R960_ReSukiSU_AP.tar             dist/R960_ReSukiSU_AP.tar.md5             > dist/SHA256SUMS.txt

          cat > dist/RELEASE_NOTES.txt <<'EOF'
          SM-R960 Galaxy Watch6 Classic ReSukiSU AP

          Target firmware:
          - R960XXU2CZB6
          - Android 16
          - Security patch 2026-02-05
          - Rollback index 2

          Package contents:
          - boot.img
          - init_boot.img
          - vbmeta.img

          Flash only after bootloader unlock.
          This AP tar is for SM-R960 R960XXU2CZB6 only.
          EOF

          echo "===== DIST FILES ====="
          ls -lh dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: r960-resukisu-ap-${{ github.run_number }}
          name: SM-R960 ReSukiSU AP ${{ github.run_number }}
          body_path: dist/RELEASE_NOTES.txt
          files: |
            dist/R960_ReSukiSU_AP.tar
            dist/R960_ReSukiSU_AP.tar.md5
            dist/Image-ReSukiSU-R960
            dist/resukisu.config
            dist/SHA256SUMS.txt
            dist/RELEASE_NOTES.txt
