name: Build SM-R960 ReSukiSU AP Complete

on:
  workflow_dispatch:
    inputs:
      resukisu_setup_url:
        description: "ReSukiSU setup.sh URL"
        required: true
        default: "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh"
      source_release_tag:
        description: "Release tag containing Kernel.tar.gz and R960XXU1CYK2_Kernel.tar.gz"
        required: true
        default: "source-tarballs"
      firmware_release_tag:
        description: "Release tag containing boot.img.lz4, init_boot.img.lz4, vbmeta.img.lz4"
        required: true
        default: "firmware-r960-czb6"

permissions:
  contents: write

jobs:
  build:
    name: Build SM-R960 ReSukiSU AP Complete
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Samsung source tarballs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          mkdir -p source

          gh release download "${{ github.event.inputs.source_release_tag }}" \
            --repo "${{ github.repository }}" \
            --dir source \
            --pattern "*.tar.gz"

          echo "===== SOURCE FILES ====="
          ls -lh source

          test -f source/Kernel.tar.gz
          test -f source/R960XXU1CYK2_Kernel.tar.gz

      - name: Download stock R960XXU2CZB6 firmware images
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          mkdir -p firmware

          gh release download "${{ github.event.inputs.firmware_release_tag }}" \
            --repo "${{ github.repository }}" \
            --dir firmware \
            --pattern "boot.img*" \
            --pattern "init_boot.img*" \
            --pattern "vbmeta.img*"

          echo "===== FIRMWARE FILES ====="
          ls -lh firmware

      - name: Install dependencies
        run: |
          set -e
          sudo apt update
          sudo apt install -y \
            build-essential bc bison flex libssl-dev libelf-dev \
            python3 python-is-python3 perl git unzip zip tar lz4 xz-utils zstd \
            clang-14 lld-14 llvm-14 rsync cpio kmod dwarves patch file curl \
            openssl \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi

      - name: Set clang 14 path
        run: |
          set -e
          echo "/usr/lib/llvm-14/bin" >> "$GITHUB_PATH"
          /usr/lib/llvm-14/bin/clang --version
          /usr/lib/llvm-14/bin/ld.lld --version

      - name: Extract Samsung kernel source
        run: |
          set -e
          mkdir -p work/kernel

          tar -xzf source/Kernel.tar.gz -C work/kernel
          tar -xzf source/R960XXU1CYK2_Kernel.tar.gz -C work/kernel --strip-components=1

          echo "===== CHECK DEFCONFIG ====="
          find work/kernel/arch/arm64/configs -type f | grep -i "wise6blue"

      - name: Add ReSukiSU
        run: |
          set -e
          cd work/kernel

          echo "===== ADDING ReSukiSU ====="
          curl -LSs "${{ github.event.inputs.resukisu_setup_url }}" | bash -

          echo "===== ReSukiSU FILE CHECK ====="
          find . -maxdepth 6 \( -iname "*resukisu*" -o -iname "*kernelsu*" -o -iname "*ksu*" \) | head -200

      - name: Apply ReSukiSU manual hooks from docs
        run: |
          set -e
          cd work/kernel

          cat > apply_resukisu_manual_hooks.py <<'PY'
          from pathlib import Path
          import re


          def read(path):
              return Path(path).read_text(errors='ignore')


          def write(path, data):
              Path(path).write_text(data)


          def re_patch(path, pattern, repl, tag, required=True, flags=re.S):
              p = Path(path)
              if not p.exists():
                  msg = f'missing file: {path} [{tag}]'
                  if required:
                      raise SystemExit(msg)
                  print('optional skip', msg)
                  return False
              s = read(path)
              if tag in s:
                  print(f'already patched: {path} [{tag}]')
                  return True
              ns, n = re.subn(pattern, repl, s, count=1, flags=flags)
              if n == 0:
                  msg = f'marker not found: {path} [{tag}]'
                  if required:
                      raise SystemExit(msg)
                  print('optional skip', msg)
                  return False
              write(path, ns)
              print(f'patched: {path} [{tag}]')
              return True


          def insert_before_literal(path, needle, block, tag, required=True):
              p = Path(path)
              if not p.exists():
                  msg = f'missing file: {path} [{tag}]'
                  if required:
                      raise SystemExit(msg)
                  print('optional skip', msg)
                  return False
              s = read(path)
              if tag in s:
                  print(f'already patched: {path} [{tag}]')
                  return True
              if needle not in s:
                  msg = f'marker not found: {path} [{tag}]'
                  if required:
                      raise SystemExit(msg)
                  print('optional skip', msg)
                  return False
              write(path, s.replace(needle, block + needle, 1))
              print(f'patched: {path} [{tag}]')
              return True


          def literal_replace(path, old, new, tag, required=False):
              p = Path(path)
              if not p.exists():
                  if required:
                      raise SystemExit(f'missing file: {path} [{tag}]')
                  print(f'optional skip missing: {path} [{tag}]')
                  return False
              s = read(path)
              if tag in s:
                  print(f'already patched: {path} [{tag}]')
                  return True
              if old not in s:
                  if required:
                      raise SystemExit(f'marker not found: {path} [{tag}]')
                  print(f'optional skip marker not found: {path} [{tag}]')
                  return False
              write(path, s.replace(old, new, 1))
              print(f'patched: {path} [{tag}]')
              return True

          # ============================================================
          # Required stat hooks: fs/stat.c
          # ============================================================
          insert_before_literal(
              'fs/stat.c',
              '#if !defined(__ARCH_WANT_STAT64) || defined(__ARCH_WANT_SYS_NEWFSTATAT)',
              '''#ifdef CONFIG_KSU_MANUAL_HOOK
          /* ReSukiSU manual hook: stat externs */
          __attribute__((hot))
          extern int ksu_handle_stat(int *dfd, const char __user **filename_user,
                                     int *flags);

          extern void ksu_handle_newfstat_ret(unsigned int *fd,
                                              struct stat __user **statbuf_ptr);
          #if defined(__ARCH_WANT_STAT64) || defined(__ARCH_WANT_COMPAT_STAT64)
          extern void ksu_handle_fstat64_ret(unsigned long *fd,
                                             struct stat64 __user **statbuf_ptr);
          #endif
          #endif

          ''',
              'ReSukiSU manual hook: stat externs',
          )

          re_patch(
              'fs/stat.c',
              r'(SYSCALL_DEFINE4\(newfstatat,.*?\{\n\s*struct kstat stat;\n\s*int error;\n\n)',
              r'\1#ifdef CONFIG_KSU_MANUAL_HOOK\n\t/* ReSukiSU manual hook: newfstatat */\n\tksu_handle_stat(&dfd, &filename, &flag);\n#endif\n',
              'ReSukiSU manual hook: newfstatat',
          )

          re_patch(
              'fs/stat.c',
              r'(SYSCALL_DEFINE2\(newfstat,.*?\{.*?if \(!error\)\n\s*error = cp_new_stat\(&stat, statbuf\);\n\n)(\s*return error;)',
              r'\1#ifdef CONFIG_KSU_MANUAL_HOOK\n\t/* ReSukiSU manual hook: newfstat ret */\n\tksu_handle_newfstat_ret(&fd, &statbuf);\n#endif\n\2',
              'ReSukiSU manual hook: newfstat ret',
          )

          re_patch(
              'fs/stat.c',
              r'(SYSCALL_DEFINE2\(fstat64,.*?\{.*?if \(!error\)\n\s*error = cp_new_stat64\(&stat, statbuf\);\n\n)(\s*return error;)',
              r'\1#ifdef CONFIG_KSU_MANUAL_HOOK\n\t/* ReSukiSU manual hook: fstat64 ret */\n\tksu_handle_fstat64_ret(&fd, &statbuf);\n#endif\n\2',
              'ReSukiSU manual hook: fstat64 ret',
          )

          re_patch(
              'fs/stat.c',
              r'(SYSCALL_DEFINE4\(fstatat64,.*?\{\n\s*struct kstat stat;\n\s*int error;\n\n)',
              r'\1#ifdef CONFIG_KSU_MANUAL_HOOK\n\t/* ReSukiSU manual hook: fstatat64 */\n\tksu_handle_stat(&dfd, &filename, &flag);\n#endif\n',
              'ReSukiSU manual hook: fstatat64',
          )

          # Optional compat stat hooks if Samsung source uses compat syscalls.
          re_patch(
              'fs/stat.c',
              r'(COMPAT_SYSCALL_DEFINE4\(newfstatat,.*?\{\n\s*struct kstat stat;\n\s*int error;\n\n)',
              r'\1#ifdef CONFIG_KSU_MANUAL_HOOK\n\t/* ReSukiSU manual hook: compat newfstatat */\n\tksu_handle_stat((int *)&dfd, (const char __user **)&filename, &flag);\n#endif\n',
              'ReSukiSU manual hook: compat newfstatat',
              required=False,
          )

          # ============================================================
          # Required execve hooks: fs/exec.c, Linux 3.14+ path.
          # ============================================================
          insert_before_literal(
              'fs/exec.c',
              'static int do_execve(struct filename *filename,',
              '''#ifdef CONFIG_KSU_MANUAL_HOOK
          /* ReSukiSU manual hook: execveat extern */
          __attribute__((hot))
          extern int ksu_handle_execveat(int *fd, struct filename **filename_ptr,
                                         void *argv, void *envp, int *flags);
          #endif

          ''',
              'ReSukiSU manual hook: execveat extern',
          )

          re_patch(
              'fs/exec.c',
              r'(static int do_execve\(struct filename \*filename,\n\s*const char __user \*const __user \*__argv,\n\s*const char __user \*const __user \*__envp\)\n\{\n\s*struct user_arg_ptr argv = \{ \.ptr\.native = __argv \};\n\s*struct user_arg_ptr envp = \{ \.ptr\.native = __envp \};\n)\s*return do_execveat_common\(AT_FDCWD, filename, argv, envp, 0\);',
              r'\1#ifdef CONFIG_KSU_MANUAL_HOOK\n\t/* ReSukiSU manual hook: do_execve */\n\tint ksu_fd = AT_FDCWD;\n\tint ksu_flags = 0;\n\tksu_handle_execveat(&ksu_fd, &filename, &argv, &envp, &ksu_flags);\n\treturn do_execveat_common(ksu_fd, filename, argv, envp, ksu_flags);\n#endif\n\treturn do_execveat_common(AT_FDCWD, filename, argv, envp, 0);',
              'ReSukiSU manual hook: do_execve',
          )

          re_patch(
              'fs/exec.c',
              r'(static int do_execveat\(int fd, struct filename \*filename,.*?\{\n\s*struct user_arg_ptr argv = \{ \.ptr\.native = __argv \};\n\s*struct user_arg_ptr envp = \{ \.ptr\.native = __envp \};\n\n)\s*return do_execveat_common\(fd, filename, argv, envp, flags\);',
              r'\1#ifdef CONFIG_KSU_MANUAL_HOOK\n\t/* ReSukiSU manual hook: do_execveat */\n\tksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);\n#endif\n\treturn do_execveat_common(fd, filename, argv, envp, flags);',
              'ReSukiSU manual hook: do_execveat',
          )

          re_patch(
              'fs/exec.c',
              r'(static int compat_do_execve\(struct filename \*filename,.*?struct user_arg_ptr envp = \{\n\s*\.is_compat = true,\n\s*\.ptr\.compat = __envp,\n\s*\};\n)\s*return do_execveat_common\(AT_FDCWD, filename, argv, envp, 0\);',
              r'\1#ifdef CONFIG_KSU_MANUAL_HOOK\n\t/* ReSukiSU manual hook: compat_do_execve */\n\tint ksu_fd = AT_FDCWD;\n\tint ksu_flags = 0;\n\tksu_handle_execveat(&ksu_fd, &filename, &argv, &envp, &ksu_flags);\n\treturn do_execveat_common(ksu_fd, filename, argv, envp, ksu_flags);\n#endif\n\treturn do_execveat_common(AT_FDCWD, filename, argv, envp, 0);',
              'ReSukiSU manual hook: compat_do_execve',
              required=False,
          )

          re_patch(
              'fs/exec.c',
              r'(static int compat_do_execveat\(int fd, struct filename \*filename,.*?struct user_arg_ptr envp = \{\n\s*\.is_compat = true,\n\s*\.ptr\.compat = __envp,\n\s*\};\n)\s*return do_execveat_common\(fd, filename, argv, envp, flags\);',
              r'\1#ifdef CONFIG_KSU_MANUAL_HOOK\n\t/* ReSukiSU manual hook: compat_do_execveat */\n\tksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);\n#endif\n\treturn do_execveat_common(fd, filename, argv, envp, flags);',
              'ReSukiSU manual hook: compat_do_execveat',
              required=False,
          )

          # ============================================================
          # Required faccessat hook: fs/open.c.
          # ============================================================
          insert_before_literal(
              'fs/open.c',
              'static long do_faccessat(int dfd, const char __user *filename, int mode, int flags)',
              '''#ifdef CONFIG_KSU_MANUAL_HOOK
          /* ReSukiSU manual hook: faccessat extern */
          __attribute__((hot))
          extern int ksu_handle_faccessat(int *dfd, const char __user **filename_user,
                                          int *mode, int *flags);
          #endif

          ''',
              'ReSukiSU manual hook: faccessat extern',
          )

          re_patch(
              'fs/open.c',
              r'(static long do_faccessat\(int dfd, const char __user \*filename, int mode, int flags\)\n\{.*?const struct cred \*old_cred = NULL;\n\n)',
              r'\1#ifdef CONFIG_KSU_MANUAL_HOOK\n\t/* ReSukiSU manual hook: do_faccessat */\n\tksu_handle_faccessat(&dfd, &filename, &mode, &flags);\n#endif\n',
              'ReSukiSU manual hook: do_faccessat',
          )

          # ============================================================
          # Required reboot hook: kernel/reboot.c.
          # ============================================================
          insert_before_literal(
              'kernel/reboot.c',
              'SYSCALL_DEFINE4(reboot, int, magic1, int, magic2, unsigned int, cmd,',
              '''#ifdef CONFIG_KSU_MANUAL_HOOK
          /* ReSukiSU manual hook: reboot extern */
          extern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd,
                                           void __user **arg);
          #endif

          ''',
              'ReSukiSU manual hook: reboot extern',
          )

          re_patch(
              'kernel/reboot.c',
              r'(SYSCALL_DEFINE4\(reboot,.*?\{\n\s*struct pid_namespace \*pid_ns = task_active_pid_ns\(current\);\n\s*char buffer\[256\];\n\s*int ret = 0;\n\n)',
              r'\1#ifdef CONFIG_KSU_MANUAL_HOOK\n\t/* ReSukiSU manual hook: sys_reboot */\n\tksu_handle_sys_reboot(magic1, magic2, cmd, &arg);\n#endif\n',
              'ReSukiSU manual hook: sys_reboot',
          )

          # ============================================================
          # Conditionally required / optional hooks from docs.
          # These are applied best-effort; CONFIG_KSU_MANUAL_HOOK guards them.
          # ============================================================
          insert_before_literal(
              'drivers/input/input.c',
              'void input_event(struct input_dev *dev,',
              '''#ifdef CONFIG_KSU_MANUAL_HOOK
          /* ReSukiSU manual hook: input externs */
          extern bool ksu_input_hook __read_mostly;
          extern __attribute__((cold)) int ksu_handle_input_handle_event(
                          unsigned int *type, unsigned int *code, int *value);
          #endif

          ''',
              'ReSukiSU manual hook: input externs',
              required=False,
          )

          re_patch(
              'drivers/input/input.c',
              r'(void input_event\(struct input_dev \*dev,.*?\{\n\s*unsigned long flags;\n\n)',
              r'\1#ifdef CONFIG_KSU_MANUAL_HOOK\n\t/* ReSukiSU manual hook: input_event */\n\tif (unlikely(ksu_input_hook))\n\t\tksu_handle_input_handle_event(&type, &code, &value);\n#endif\n',
              'ReSukiSU manual hook: input_event',
              required=False,
          )

          insert_before_literal(
              'kernel/sys.c',
              'long __sys_setresuid(uid_t ruid, uid_t euid, uid_t suid)',
              '''#ifdef CONFIG_KSU_MANUAL_HOOK
          /* ReSukiSU manual hook: setresuid extern */
          extern int ksu_handle_setresuid(uid_t ruid, uid_t euid, uid_t suid);
          #endif

          ''',
              'ReSukiSU manual hook: setresuid extern',
              required=False,
          )

          re_patch(
              'kernel/sys.c',
              r'(long __sys_setresuid\(uid_t ruid, uid_t euid, uid_t suid\)\n\{.*?kuid_t kruid, keuid, ksuid;\n\s*bool ruid_new, euid_new, suid_new;\n\n)',
              r'\1#ifdef CONFIG_KSU_MANUAL_HOOK\n\t/* ReSukiSU manual hook: __sys_setresuid */\n\t(void)ksu_handle_setresuid(ruid, euid, suid);\n#endif\n',
              'ReSukiSU manual hook: __sys_setresuid',
              required=False,
          )

          insert_before_literal(
              'fs/read_write.c',
              'SYSCALL_DEFINE3(read, unsigned int, fd, char __user *, buf, size_t, count)',
              '''#ifdef CONFIG_KSU_MANUAL_HOOK
          /* ReSukiSU manual hook: sys_read externs */
          extern bool ksu_init_rc_hook __read_mostly;
          extern __attribute__((cold)) int ksu_handle_sys_read(unsigned int fd,
                          char __user **buf_ptr, size_t *count_ptr);
          #endif

          ''',
              'ReSukiSU manual hook: sys_read externs',
              required=False,
          )

          re_patch(
              'fs/read_write.c',
              r'(SYSCALL_DEFINE3\(read, unsigned int, fd, char __user \*, buf, size_t, count\)\n\{\n)\s*return ksys_read\(fd, buf, count\);',
              r'\1#ifdef CONFIG_KSU_MANUAL_HOOK\n\t/* ReSukiSU manual hook: sys_read body */\n\tif (unlikely(ksu_init_rc_hook))\n\t\tksu_handle_sys_read(fd, &buf, &count);\n#endif\n\treturn ksys_read(fd, buf, count);',
              'ReSukiSU manual hook: sys_read body',
              required=False,
          )

          # Optional SELinux exports from docs.
          literal_replace('security/selinux/ss/services.c', 'static DEFINE_RWLOCK(policy_rwlock);', 'DEFINE_RWLOCK(policy_rwlock);', 'ReSukiSU optional: policy_rwlock export')
          literal_replace('security/selinux/hooks.c', 'static struct security_operations selinux_ops', 'struct security_operations selinux_ops', 'ReSukiSU optional: selinux_ops export')
          literal_replace('security/selinux/selinuxfs.c', 'static DEFINE_MUTEX(sel_mutex);', 'DEFINE_MUTEX(sel_mutex);', 'ReSukiSU optional: sel_mutex export')

          print('ReSukiSU documented manual integration patcher finished.')
          PY

          python3 apply_resukisu_manual_hooks.py

          echo "===== Verify manual hook symbols ====="
          grep -R "ksu_handle_stat\|ksu_handle_newfstat_ret\|ksu_handle_fstat64_ret\|ksu_handle_execveat\|ksu_handle_faccessat\|ksu_handle_sys_reboot\|ksu_handle_setresuid\|ksu_handle_sys_read\|ksu_handle_input_handle_event" \
            fs/stat.c fs/exec.c fs/open.c kernel/reboot.c kernel/sys.c fs/read_write.c drivers/input/input.c || true

      - name: Build ReSukiSU kernel
        run: |
          set -e
          cd work/kernel

          export PLATFORM_VERSION=16
          export TARGET_SOC=s5e5515
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export KBUILD_BUILD_USER=dpi
          export KBUILD_BUILD_HOST=VPHORC629
          export PATH="/usr/lib/llvm-14/bin:$PATH"

          make O=out_resukisu s5e5515-wise6blue_defconfig

          printf "" > .scmversion

          ./scripts/config --file out_resukisu/.config --set-str LOCALVERSION "-33003255-abR960XXU2CZB6" || true
          ./scripts/config --file out_resukisu/.config -d LOCALVERSION_AUTO || true

          # Disable Samsung/custom-kernel blockers if present.
          ./scripts/config --file out_resukisu/.config -d MODULE_SIG_PROTECT || true
          ./scripts/config --file out_resukisu/.config -d UH || true
          ./scripts/config --file out_resukisu/.config -d RKP || true
          ./scripts/config --file out_resukisu/.config -d KDP || true
          ./scripts/config --file out_resukisu/.config -d SECURITY_DEFEX || true
          ./scripts/config --file out_resukisu/.config -d SVSMC || true
          ./scripts/config --file out_resukisu/.config -d SAMSUNG_PRODUCT_SHIP || true

          # ReSukiSU required configs from build docs.
          ./scripts/config --file out_resukisu/.config -e KSU || true
          ./scripts/config --file out_resukisu/.config -e KERNELSU || true
          ./scripts/config --file out_resukisu/.config -e RESUKISU || true
          ./scripts/config --file out_resukisu/.config -e KSU_MANUAL_HOOK || true

          # ReSukiSU conditionally-required auto hooks from manual docs.
          ./scripts/config --file out_resukisu/.config -e KSU_MANUAL_HOOK_AUTO_INPUT_HOOK || true
          ./scripts/config --file out_resukisu/.config -e KSU_MANUAL_HOOK_AUTO_SETUID_HOOK || true
          ./scripts/config --file out_resukisu/.config -e KSU_MANUAL_HOOK_AUTO_INITRC_HOOK || true

          # Do not enable SUSFS here. ReSukiSU docs say SUSFS needs matching kernel-side patches.

          make O=out_resukisu olddefconfig

          echo "===== CONFIG CHECK ====="
          grep -Ei "LOCALVERSION|KSU|KERNELSU|RESUKISU|KSU_MANUAL_HOOK|MODULE_SIG_PROTECT|CONFIG_UH|CONFIG_RKP|CONFIG_KDP|CONFIG_SECURITY_DEFEX|CONFIG_SVSMC|CONFIG_SAMSUNG_PRODUCT_SHIP" out_resukisu/.config || true

          echo "===== SAMSUNG BLOCKER STRICT CHECK ====="
          BAD=0
          for sym in \
            CONFIG_MODULE_SIG_PROTECT \
            CONFIG_UH \
            CONFIG_RKP \
            CONFIG_KDP \
            CONFIG_SECURITY_DEFEX \
            CONFIG_SVSMC \
            CONFIG_SAMSUNG_PRODUCT_SHIP
          do
            if grep -q "^${sym}=y" out_resukisu/.config; then
              echo "ERROR: $sym is still enabled"
              BAD=1
            fi
          done

          if [ "$BAD" = "1" ]; then
            echo "Samsung blocker config still enabled. Stop build."
            exit 1
          fi

          make O=out_resukisu -j"$(nproc)"

          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp out_resukisu/arch/arm64/boot/Image "$GITHUB_WORKSPACE/dist/Image-ReSukiSU-R960"
          cp out_resukisu/.config "$GITHUB_WORKSPACE/dist/resukisu.config"

          echo "===== BUILT KERNEL IMAGE ====="
          ls -lh "$GITHUB_WORKSPACE/dist/Image-ReSukiSU-R960"

      - name: Prepare stock firmware images
        run: |
          set -e
          mkdir -p work/firmware

          normalize_img() {
            name="$1"

            if [ -f "firmware/${name}.img" ]; then
              cp "firmware/${name}.img" "work/firmware/${name}.img"
              return 0
            fi

            if [ -f "firmware/${name}.img.lz4" ]; then
              lz4 -d -f "firmware/${name}.img.lz4" "work/firmware/${name}.img"
              return 0
            fi

            echo "Missing ${name}.img or ${name}.img.lz4"
            exit 1
          }

          normalize_img boot
          normalize_img init_boot
          normalize_img vbmeta

          echo "===== NORMALIZED FIRMWARE IMAGES ====="
          ls -lh work/firmware

      - name: Download avbtool
        run: |
          set -e

          echo "===== Download avbtool with retries/fallbacks ====="

          if [ -f "tools/avbtool.py" ]; then
            echo "Using repo-local tools/avbtool.py"
            cp tools/avbtool.py avbtool.py
          else
            mkdir -p tools

            python3 - <<'PY' || true
          import base64
          import time
          import urllib.request

          url = "https://android.googlesource.com/platform/external/avb/+/refs/heads/main/avbtool.py?format=TEXT"

          for attempt in range(1, 8):
              try:
                  print(f"Attempt {attempt}: {url}")
                  data = urllib.request.urlopen(url, timeout=60).read()
                  open("avbtool.py", "wb").write(base64.b64decode(data))
                  print("Downloaded avbtool.py from googlesource")
                  raise SystemExit(0)
              except Exception as e:
                  print("Failed:", e)
                  time.sleep(5)

          raise SystemExit(1)
          PY

            if [ ! -s avbtool.py ]; then
              echo "Googlesource failed. Trying GitHub raw mirror..."
              curl -L --retry 10 --retry-all-errors --retry-delay 5 \
                -o avbtool.py \
                https://raw.githubusercontent.com/aosp-mirror/platform_external_avb/master/avbtool.py
            fi

            if [ ! -s avbtool.py ]; then
              echo "Raw mirror failed. Cloning GitHub mirror..."
              git clone --depth=1 https://github.com/aosp-mirror/platform_external_avb.git tools/platform_external_avb
              cp tools/platform_external_avb/avbtool.py avbtool.py
            fi
          fi

          chmod +x avbtool.py

          echo "===== avbtool check ====="
          python3 avbtool.py --help >/dev/null
          python3 avbtool.py --version || true
          echo "avbtool OK"

      - name: Repack boot.img with ReSukiSU Image
        run: |
          set -e

          cat > repack_boot_v4.py <<'PY'
          import struct
          from pathlib import Path

          PAGE = 4096
          SEANDROID = b"SEANDROIDENFORCE"

          stock_path = Path("work/firmware/boot.img")
          kernel_path = Path("dist/Image-ReSukiSU-R960")
          out_path = Path("work/firmware/boot_resukisu_noavb.img")

          stock = stock_path.read_bytes()
          kernel = kernel_path.read_bytes()

          if stock[:8] != b"ANDROID!":
              raise SystemExit("stock boot.img is not an Android boot image")

          old_kernel_size = struct.unpack("<I", stock[8:12])[0]
          ramdisk_size = struct.unpack("<I", stock[12:16])[0]
          os_version = struct.unpack("<I", stock[16:20])[0]
          header_size = struct.unpack("<I", stock[20:24])[0]
          header_version = struct.unpack("<I", stock[40:44])[0]
          cmdline = stock[44:44 + 1536]

          print("Old kernel size:", old_kernel_size)
          print("New kernel size:", len(kernel))
          print("Ramdisk size:", ramdisk_size)
          print("Header size:", header_size)
          print("Header version:", header_version)

          if header_version != 4:
              raise SystemExit(f"Expected boot header v4, got {header_version}")

          if ramdisk_size != 0:
              raise SystemExit(f"Expected ramdisk_size 0 for R960 boot.img, got {ramdisk_size}")

          def pad(data: bytes, page=PAGE) -> bytes:
              rem = len(data) % page
              if rem:
                  data += b"\x00" * (page - rem)
              return data

          hdr = bytearray()
          hdr += b"ANDROID!"
          hdr += struct.pack("<I", len(kernel))
          hdr += struct.pack("<I", 0)
          hdr += struct.pack("<I", os_version)
          hdr += struct.pack("<I", 1584)
          hdr += struct.pack("<4I", 0, 0, 0, 0)
          hdr += struct.pack("<I", 4)
          hdr += cmdline
          hdr += struct.pack("<I", 0)

          if len(hdr) != 1584:
              raise SystemExit(f"Bad header size: {len(hdr)}")

          img = bytes(hdr)
          img = pad(img)
          img += kernel
          img = pad(img)
          img += SEANDROID
          img = pad(img)

          if len(img) >= 50331648:
              raise SystemExit(f"New boot image too large: {len(img)}")

          out_path.write_bytes(img)
          print("Wrote:", out_path)
          print("Size:", out_path.stat().st_size)
          print("Room left:", 50331648 - out_path.stat().st_size)
          PY

          python3 repack_boot_v4.py

      - name: Generate local AVB key and re-footer boot/init_boot
        run: |
          set -e

          mkdir -p avb_keys

          openssl genrsa -out avb_keys/r960_local_avb.pem 4096

          cp work/firmware/boot_resukisu_noavb.img work/firmware/boot.img
          cp work/firmware/init_boot.img work/firmware/init_boot_refooter.img

          echo "===== Re-footer boot.img with local AVB key rollback index 2 ====="
          python3 avbtool.py erase_footer --image work/firmware/boot.img || true

          python3 avbtool.py add_hash_footer \
            --image work/firmware/boot.img \
            --partition_name boot \
            --partition_size 50331648 \
            --algorithm SHA256_RSA4096 \
            --key avb_keys/r960_local_avb.pem \
            --rollback_index 2

          echo "===== Re-footer init_boot.img with same local AVB key rollback index 2 ====="
          python3 avbtool.py erase_footer --image work/firmware/init_boot_refooter.img || true

          python3 avbtool.py add_hash_footer \
            --image work/firmware/init_boot_refooter.img \
            --partition_name init_boot \
            --partition_size 16777216 \
            --algorithm SHA256_RSA4096 \
            --key avb_keys/r960_local_avb.pem \
            --rollback_index 2

          mv work/firmware/init_boot_refooter.img work/firmware/init_boot.img

          echo "===== boot AVB info ====="
          python3 avbtool.py info_image --image work/firmware/boot.img || true

          echo "===== init_boot AVB info ====="
          python3 avbtool.py info_image --image work/firmware/init_boot.img || true

      - name: Generate new top-level vbmeta.img
        run: |
          set -e

          python3 avbtool.py make_vbmeta_image \
            --output work/firmware/vbmeta.img \
            --algorithm SHA256_RSA4096 \
            --key avb_keys/r960_local_avb.pem \
            --rollback_index 2 \
            --flags 3 \
            --prop com.android.build.boot.os_version:16 \
            --prop com.android.build.boot.security_patch:2026-02-05 \
            --include_descriptors_from_image work/firmware/boot.img \
            --include_descriptors_from_image work/firmware/init_boot.img

          echo "===== New vbmeta info ====="
          python3 avbtool.py info_image --image work/firmware/vbmeta.img

      - name: Build plain POSIX Odin/NetOdin AP tar
        run: |
          set -e

          mkdir -p final_ap

          cp work/firmware/boot.img final_ap/boot.img
          cp work/firmware/init_boot.img final_ap/init_boot.img
          cp work/firmware/vbmeta.img final_ap/vbmeta.img

          tar --format=posix -cf dist/R960_ReSukiSU_Complete_AP.tar -C final_ap boot.img init_boot.img vbmeta.img

          cp dist/R960_ReSukiSU_Complete_AP.tar dist/R960_ReSukiSU_Complete_AP.tar.md5
          (cd dist && md5sum R960_ReSukiSU_Complete_AP.tar >> R960_ReSukiSU_Complete_AP.tar.md5)

          sha256sum \
            dist/Image-ReSukiSU-R960 \
            dist/resukisu.config \
            dist/R960_ReSukiSU_Complete_AP.tar \
            dist/R960_ReSukiSU_Complete_AP.tar.md5 \
            > dist/SHA256SUMS.txt

          cat > dist/RELEASE_NOTES.txt <<'EOF'
          SM-R960 Galaxy Watch6 Classic ReSukiSU Complete AP

          Target firmware:
          - R960XXU2CZB6
          - Android 16
          - Security patch 2026-02-05
          - Rollback index 2

          Package contents:
          - boot.img
          - init_boot.img
          - vbmeta.img

          ReSukiSU documentation features included:
          - ReSukiSU setup.sh integration
          - CONFIG_KSU=y
          - CONFIG_KSU_MANUAL_HOOK=y
          - Required manual hooks: stat, execve, faccessat, sys_reboot
          - Conditional hooks attempted: input_event, setresuid, sys_read
          - Optional SELinux exports attempted: policy_rwlock, selinux_ops, sel_mutex

          SUSFS is intentionally not enabled because ReSukiSU docs require matching kernel-side SUSFS patches.

          Flash only after bootloader unlock.
          This AP tar is for SM-R960 R960XXU2CZB6 only.
          EOF

          echo "===== DIST FILES ====="
          ls -lh dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: r960-resukisu-complete-ap-${{ github.run_number }}
          name: SM-R960 ReSukiSU Complete AP ${{ github.run_number }}
          body_path: dist/RELEASE_NOTES.txt
          files: |
            dist/R960_ReSukiSU_Complete_AP.tar
            dist/R960_ReSukiSU_Complete_AP.tar.md5
            dist/Image-ReSukiSU-R960
            dist/resukisu.config
            dist/SHA256SUMS.txt
            dist/RELEASE_NOTES.txt
